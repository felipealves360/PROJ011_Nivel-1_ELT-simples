name: ETL Estoque

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 9 * * *"  # 09:00 UTC = 06:00 -03

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python etl_estoque.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
