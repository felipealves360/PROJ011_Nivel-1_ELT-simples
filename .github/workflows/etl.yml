# Ver notas/github-actions-workflow.md (raiz do projeto) para explicacao detalhada linha a linha.

name: ETL Estoque  # nome exibido na aba Actions do Github, so um rotulo

on:
  workflow_dispatch: {}  # habilita o botao "Run workflow" manual na aba Actions do Github
  # schedule desativado em 2026-07-22: Nivel 2 passou a rodar no mesmo Supabase
  # (dw_bronze/dw_silver/dw_gold compartilhados) e escreve nas mesmas tabelas
  # (dw_bronze.movimentacao, dw_gold.posicao_estoque) com semantica diferente
  # (replace vs append). Cron diario do N1 e do N2 rodando juntos causava
  # sobrescrita/duplicacao cruzada. N1 ja esta concluido; roda so manualmente.
  # schedule:
  #   - cron: "0 9 * * *"

jobs:
  run-etl:
    runs-on: ubuntu-latest  # VM efemera: nasce vazia, e destruida no final da execucao
    steps:
      - uses: actions/checkout@v4  # clona o repo dentro da VM (nasce vazia)

      - uses: actions/setup-python@v5  # instala o Python na VM
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt  # instala as dependencias do projeto

      - run: python etl_estoque.py  # roda o ETL de verdade
        env:
          # injeta o secret so nesse processo; GitHub mascara o valor nos logs
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
